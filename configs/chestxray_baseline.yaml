name: chestxray_baseline

data:
  train_root: data/processed/chestxray/train
  val_root: data/processed/chestxray/val
  image_size: 224
  batch_size: 32

model:
  name: resnet18
  num_classes: 2
  pretrained: true

train:
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.00001
  optimizer: adam
  seed: 42

extras:
  task: binary
  positive_class: pneumonia
