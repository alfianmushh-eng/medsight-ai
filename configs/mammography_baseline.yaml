name: mammography_baseline
data:
  train_root: data/processed/mammo/train
  val_root: data/processed/mammo/val
  image_size: 512
  batch_size: 16
model:
  name: resnet50
  num_classes: 2
  pretrained: true
train:
  epochs: 50
  learning_rate: 0.00005
  weight_decay: 0.0001
  optimizer: adam
  seed: 42
